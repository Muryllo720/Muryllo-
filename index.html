<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Muryllo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0a0a0f;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* Fundo estrelado simples */
    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #1a1a2e, #0a0a0f);
      z-index: -1;
    }

    /* Tela principal */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 52px;
      letter-spacing: 3px;
    }

    p {
      margin-top: 15px;
      max-width: 500px;
      opacity: 0.7;
      line-height: 1.6;
    }

    button {
      margin-top: 25px;
      padding: 12px 24px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: white;
      color: black;
    }

    /* responsivo */
    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="hero">
    <h1>Muryllo</h1>
    <p>
      Um universo em construção — poesia, arte e identidade.
      Aqui nascem ideias, sentimentos e fragmentos de vida.
    </p>

    <button>Explorar</button>
  </div>

</body>
</html>
